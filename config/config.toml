# Honcho config.toml — local Ollama + Ollama Cloud
# Copy to: $APPDATA_ROOT/config/config.toml
# Mounted read-only into the api container.
#
# PROVIDER STRATEGY:
#   Local Ollama on Unraid tower: qwen3.5:4b for hot-path/light work
#   Ollama Cloud subscription: DeepSeek V4 for dialectic reasoning tiers
#   Embeddings: local Ollama embeddinggemma, 768 dimensions

[app]
LOG_LEVEL = "INFO"
SESSION_OBSERVERS_LIMIT = 10
GET_CONTEXT_MAX_TOKENS = 100000
MAX_FILE_SIZE = 5242880
MAX_MESSAGE_SIZE = 25000
EMBED_MESSAGES = true
MAX_EMBEDDING_TOKENS = 8192
NAMESPACE = "honcho"

[db]
CONNECTION_URI = "postgresql+psycopg://honcho:honcho@database:5432/honcho"
SCHEMA = "public"
POOL_SIZE = 10
MAX_OVERFLOW = 20
POOL_TIMEOUT = 30
POOL_RECYCLE = 300

[auth]
USE_AUTH = false

[cache]
ENABLED = true
URL = "redis://redis:6379/0?suppress=true"
DEFAULT_TTL_SECONDS = 300

# ---------------------------------------------------------------------------
# LLM provider credentials
# ---------------------------------------------------------------------------
[llm]
DEFAULT_MAX_TOKENS = 2500
MAX_TOOL_OUTPUT_CHARS = 10000
MAX_MESSAGE_CONTENT_CHARS = 2000

# Secrets come from .env via api_key_env in each model config.
# LLM_OPENAI_API_KEY is kept in .env only as a harmless default for clients that
# expect it to exist; runtime model configs below use explicit api_key_env values.

# ---------------------------------------------------------------------------
# Embeddings — local Ollama embeddinggemma, 768 dimensions
# ---------------------------------------------------------------------------
[embedding]
VECTOR_DIMENSIONS = 768
MAX_INPUT_TOKENS = 8192
MAX_TOKENS_PER_REQUEST = 300000

[embedding.model_config]
transport = "openai"
model = "embeddinggemma"
dimensions_mode = "never"

[embedding.model_config.overrides]
base_url = "http://192.168.1.79:11434/v1"
api_key_env = "LLM_EMBEDDING_API_KEY"

# ---------------------------------------------------------------------------
# Deriver — observation extraction (runs every message, needs speed + tools)
# ---------------------------------------------------------------------------
[deriver]
ENABLED = true
WORKERS = 1
POLLING_SLEEP_INTERVAL_SECONDS = 1.0
STALE_SESSION_TIMEOUT_MINUTES = 5
DEDUPLICATE = true
MAX_INPUT_TOKENS = 23000
WORKING_REPRESENTATION_MAX_OBSERVATIONS = 100
REPRESENTATION_BATCH_MAX_TOKENS = 1024
FLUSH_ENABLED = false

[deriver.model_config]
transport = "openai"
model = "qwen3.5:4b"
max_output_tokens = 4096
thinking_effort = "none"

[deriver.model_config.overrides]
base_url = "http://192.168.1.79:11434/v1"
api_key_env = "LLM_VLLM_API_KEY"

[deriver.model_config.fallback]
transport = "openai"
model = "deepseek-v4-flash:cloud"
thinking_effort = "high"
max_output_tokens = 4096

[deriver.model_config.fallback.overrides]
base_url = "https://ollama.com/v1"
api_key_env = "LLM_OPENAI_COMPATIBLE_API_KEY"

# ---------------------------------------------------------------------------
# Dialectic — multi-level reasoning for peer.chat
# ---------------------------------------------------------------------------
[dialectic]
MAX_OUTPUT_TOKENS = 8192
MAX_INPUT_TOKENS = 100000
HISTORY_TOKEN_LIMIT = 8192
SESSION_HISTORY_MAX_TOKENS = 4096

[dialectic.levels.minimal]
MAX_TOOL_ITERATIONS = 1
MAX_OUTPUT_TOKENS = 250
TOOL_CHOICE = "auto"

[dialectic.levels.minimal.model_config]
transport = "openai"
model = "qwen3.5:4b"
thinking_effort = "none"

[dialectic.levels.minimal.model_config.overrides]
base_url = "http://192.168.1.79:11434/v1"
api_key_env = "LLM_VLLM_API_KEY"

[dialectic.levels.minimal.model_config.fallback]
transport = "openai"
model = "deepseek-v4-flash:cloud"
thinking_effort = "high"

[dialectic.levels.minimal.model_config.fallback.overrides]
base_url = "https://ollama.com/v1"
api_key_env = "LLM_OPENAI_COMPATIBLE_API_KEY"

# Low: Ollama Cloud DeepSeek V4 Flash, thinking mode.
[dialectic.levels.low]
MAX_TOOL_ITERATIONS = 5
TOOL_CHOICE = "auto"

[dialectic.levels.low.model_config]
transport = "openai"
model = "deepseek-v4-flash:cloud"
thinking_effort = "high"

[dialectic.levels.low.model_config.overrides]
base_url = "https://ollama.com/v1"
api_key_env = "LLM_OPENAI_COMPATIBLE_API_KEY"

[dialectic.levels.low.model_config.fallback]
transport = "openai"
model = "qwen3.5:4b"
thinking_effort = "none"

[dialectic.levels.low.model_config.fallback.overrides]
base_url = "http://192.168.1.79:11434/v1"
api_key_env = "LLM_VLLM_API_KEY"

# Medium: Ollama Cloud DeepSeek V4 Flash, max thinking mode.
[dialectic.levels.medium]
MAX_TOOL_ITERATIONS = 2

[dialectic.levels.medium.model_config]
transport = "openai"
model = "deepseek-v4-flash:cloud"
thinking_effort = "max"

[dialectic.levels.medium.model_config.overrides]
base_url = "https://ollama.com/v1"
api_key_env = "LLM_OPENAI_COMPATIBLE_API_KEY"

[dialectic.levels.medium.model_config.fallback]
transport = "openai"
model = "qwen3.5:4b"
thinking_effort = "none"

[dialectic.levels.medium.model_config.fallback.overrides]
base_url = "http://192.168.1.79:11434/v1"
api_key_env = "LLM_VLLM_API_KEY"

# High: Ollama Cloud DeepSeek V4 Pro.
[dialectic.levels.high]
MAX_TOOL_ITERATIONS = 4

[dialectic.levels.high.model_config]
transport = "openai"
model = "deepseek-v4-pro:cloud"

[dialectic.levels.high.model_config.overrides]
base_url = "https://ollama.com/v1"
api_key_env = "LLM_OPENAI_COMPATIBLE_API_KEY"

[dialectic.levels.high.model_config.fallback]
transport = "openai"
model = "qwen3.5:4b"
thinking_effort = "none"

[dialectic.levels.high.model_config.fallback.overrides]
base_url = "http://192.168.1.79:11434/v1"
api_key_env = "LLM_VLLM_API_KEY"

[dialectic.levels.max]
MAX_TOOL_ITERATIONS = 10

[dialectic.levels.max.model_config]
transport = "openai"
model = "llama4"

[dialectic.levels.max.model_config.overrides]
base_url = "https://ollama.com/v1"
api_key_env = "LLM_OPENAI_COMPATIBLE_API_KEY"

[dialectic.levels.max.model_config.fallback]
transport = "openai"
model = "qwen3.5:4b"
thinking_effort = "none"

[dialectic.levels.max.model_config.fallback.overrides]
base_url = "http://192.168.1.79:11434/v1"
api_key_env = "LLM_VLLM_API_KEY"

# ---------------------------------------------------------------------------
# Summary — session summarization
# ---------------------------------------------------------------------------
[summary]
ENABLED = true
MESSAGES_PER_SHORT_SUMMARY = 20
MESSAGES_PER_LONG_SUMMARY = 60
MAX_TOKENS_SHORT = 1000
MAX_TOKENS_LONG = 4000

[summary.model_config]
transport = "openai"
model = "qwen3.5:4b"
thinking_effort = "none"
max_output_tokens = 4000

[summary.model_config.overrides]
base_url = "http://192.168.1.79:11434/v1"
api_key_env = "LLM_VLLM_API_KEY"

[summary.model_config.fallback]
transport = "openai"
model = "deepseek-v4-flash:cloud"
thinking_effort = "high"
max_output_tokens = 4000

[summary.model_config.fallback.overrides]
base_url = "https://ollama.com/v1"
api_key_env = "LLM_OPENAI_COMPATIBLE_API_KEY"

# ---------------------------------------------------------------------------
# Dream — memory consolidation (runs rarely, needs best quality)
# ---------------------------------------------------------------------------
[dream]
ENABLED = true
DOCUMENT_THRESHOLD = 50
IDLE_TIMEOUT_MINUTES = 60
MIN_HOURS_BETWEEN_DREAMS = 8
ENABLED_TYPES = ["omni"]
MAX_OUTPUT_TOKENS = 16384
MAX_TOOL_ITERATIONS = 20
HISTORY_TOKEN_LIMIT = 16384

[dream.deduction_model_config]
transport = "openai"
model = "llama4"
max_output_tokens = 16384

[dream.deduction_model_config.overrides]
base_url = "https://ollama.com/v1"
api_key_env = "LLM_OPENAI_COMPATIBLE_API_KEY"

[dream.deduction_model_config.fallback]
transport = "openai"
model = "qwen3.5:4b"
thinking_effort = "none"
max_output_tokens = 4096

[dream.deduction_model_config.fallback.overrides]
base_url = "http://192.168.1.79:11434/v1"
api_key_env = "LLM_VLLM_API_KEY"

[dream.induction_model_config]
transport = "openai"
model = "llama4"
max_output_tokens = 16384

[dream.induction_model_config.overrides]
base_url = "https://ollama.com/v1"
api_key_env = "LLM_OPENAI_COMPATIBLE_API_KEY"

[dream.induction_model_config.fallback]
transport = "openai"
model = "qwen3.5:4b"
thinking_effort = "none"
max_output_tokens = 4096

[dream.induction_model_config.fallback.overrides]
base_url = "http://192.168.1.79:11434/v1"
api_key_env = "LLM_VLLM_API_KEY"

[peer_card]
ENABLED = true

[metrics]
ENABLED = false

[telemetry]
ENABLED = false

[sentry]
ENABLED = false
